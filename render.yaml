services:
  - type: web
    name: tone-tester-relay
    runtime: python
    plan: free
    pythonVersion: "3.12.7"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: APP_KEY
        generateValue: true
      - key: APP_ORIGIN
        value: "*"
      - key: LIVE_TONE
        value: "0"
